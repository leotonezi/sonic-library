name: Weekly dev→master sync PR

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  weekly-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for differences
        id: diff
        run: |
          git fetch origin development master
          DIFF=$(git log origin/master..origin/development --oneline)
          if [ -z "$DIFF" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$DIFF" | wc -l | tr -d ' ')
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        id: create-pr
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base master --head development --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "pr_created=false" >> "$GITHUB_OUTPUT"
          else
            COUNT="${{ steps.diff.outputs.commit_count }}"
            COMMITS=$(git log origin/master..origin/development --format="| \`%h\` | %s | %an | %cd |" --date=short)

            {
              echo "## Weekly Sync: \`development\` → \`master\`"
              echo ""
              echo "**${COUNT} commit(s)** pending merge as of $(date +%Y-%m-%d)."
              echo ""
              echo "| Hash | Message | Author | Date |"
              echo "|------|---------|--------|------|"
              echo "$COMMITS"
              echo ""
              echo "---"
              echo "🤖 Generated by the weekly-sync workflow."
            } > /tmp/pr-body.md

            PR_URL=$(gh pr create \
              --title "chore: weekly sync development → master ($(date +%Y-%m-%d))" \
              --body-file /tmp/pr-body.md \
              --base master \
              --head development)
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pr_created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        if: steps.diff.outputs.has_changes == 'true' && steps.create-pr.outputs.pr_created == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Sonic Library] Weekly PR ready: development → master"
          to: leoademir0@gmail.com
          from: ${{ secrets.MAIL_FROM }}
          body: |
            Weekly sync PR is ready for review.

            PR #${{ steps.create-pr.outputs.pr_number }}
            ${{ steps.create-pr.outputs.pr_url }}

            ${{ steps.diff.outputs.commit_count }} commit(s) from development not yet in master.

            Review and merge when ready.
